<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — RealityOS AI</title>
  <meta name="description" content="Create your free RealityOS AI account and start simulating smarter decisions today." />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-card { width: 100%; max-width: 460px; background: rgba(10,15,38,0.8); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: 48px 40px; backdrop-filter: blur(30px); animation: fadeSlideIn 0.5s ease; position: relative; z-index: 1; }
    .auth-header { text-align: center; margin-bottom: 36px; }
    .auth-logo { width: 54px; height: 54px; background: var(--gradient-main); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 16px; box-shadow: 0 0 30px rgba(79,142,247,0.3); }
    .auth-footer-text { text-align: center; margin-top: 24px; font-size: 0.875rem; color: var(--text-muted); }
    .auth-footer-text a { color: var(--accent-blue); font-weight: 600; }
    .perks { display: flex; flex-direction: column; gap: 8px; margin-top: 24px; padding: 16px; background: rgba(16,185,129,0.05); border: 1px solid rgba(16,185,129,0.12); border-radius: var(--radius-md); }
    .perk { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-secondary); }
    .perk::before { content: '✓'; color: var(--accent-green); font-weight: 700; }
    @media (max-width: 480px) { .auth-card { padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="glow-orb-2"></div>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" style="display:block;text-align:center;margin-bottom:4px;">
        <div class="auth-logo">🧠</div>
      </a>
      <div class="auth-header">
        <h1 style="font-size:1.6rem;margin-bottom:8px;">Create your account</h1>
        <p style="color:var(--text-secondary);font-size:0.9rem;">Start simulating smarter decisions. Free forever.</p>
      </div>

      <div id="alert-container"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="full-name">Full Name</label>
          <input type="text" id="full-name" class="form-control" placeholder="Jane Smith" autocomplete="name" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="At least 6 characters" autocomplete="new-password" required />
        </div>

        <button type="submit" class="btn btn-primary w-full" id="register-btn" style="width:100%;justify-content:center;margin-top:8px;">
          🚀 Create Free Account
        </button>
      </form>

      <div class="perks">
        <div class="perk">Unlimited AI decision simulations</div>
        <div class="perk">Save reports to your personal dashboard</div>
        <div class="perk">Powered by Google Gemini AI</div>
      </div>

      <p class="auth-footer-text">Already have an account? <a href="login.html">Sign in →</a></p>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Auth.redirectIfAuth();

      const form = document.getElementById('register-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('alert-container');

        const fullName = document.getElementById('full-name').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!fullName || fullName.length < 2) { showAlert('alert-container', 'Full name must be at least 2 characters.'); return; }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('alert-container', 'Please enter a valid email address.'); return; }
        if (!password || password.length < 6) { showAlert('alert-container', 'Password must be at least 6 characters.'); return; }

        setLoading('register-btn', true, 'Creating account...');
        const res = await API.register({ full_name: fullName, email, password });
        setLoading('register-btn', false, '🚀 Create Free Account');

        if (res.ok && res.data.success) {
          showAlert('alert-container', 'Account created! Signing you in...', 'success');
          // Auto-login after register
          const loginRes = await API.login({ email, password });
          if (loginRes.ok && loginRes.data.success) {
            Auth.setUser(loginRes.data.user);
            setTimeout(() => window.location.href = 'dashboard.html', 1000);
          } else {
            setTimeout(() => window.location.href = 'login.html', 1200);
          }
        } else {
          showAlert('alert-container', res.data.error || 'Registration failed. Please try again.');
        }
      });
    });
  </script>
</body>
</html>
