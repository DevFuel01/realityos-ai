<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analysis Results — RealityOS AI</title>
  <meta name="description" content="AI-powered decision analysis results from RealityOS AI." />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .result-section { margin-bottom: 32px; }
    .section-title { font-size: 1rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .option-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .outlook-box { padding: 14px 16px; border-radius: var(--radius-md); margin-top: 12px; font-size: 0.85rem; line-height: 1.6; }
    .outlook-short { background: rgba(79,142,247,0.06); border: 1px solid rgba(79,142,247,0.12); }
    .outlook-long  { background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.12); }
    .comparison-table { width: 100%; border-collapse: collapse; }
    .comparison-table td, .comparison-table th { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.875rem; }
    .comparison-table th { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .comparison-table td:last-child { text-align: right; }
    .win-badge { padding: 4px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; background: rgba(79,142,247,0.15); color: var(--accent-blue); border: 1px solid rgba(79,142,247,0.2); }
    .reasoning-block { padding: 20px 24px; background: rgba(255,255,255,0.02); border-left: 3px solid var(--accent-blue); border-radius: 0 var(--radius-md) var(--radius-md) 0; font-size: 0.9rem; color: var(--text-secondary); line-height: 1.8; font-style: italic; }
    .hidden { display: none !important; }
    #save-btn-area { display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end; margin-top: 24px; }
    #save-success { display: none; }
    
    /* Comparison Panel Styles */
    .cmp-row { transition: all 0.3s ease; }
    .cmp-row:hover { background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); }
    .cmp-bar-a, .cmp-bar-b { width: 0; }
  </style>
</head>
<body>
  <div class="glow-orb-2"></div>
  <div id="toast-msg" class="toast-msg"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:16px;">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <a href="index.html" class="navbar-brand"><div class="navbar-logo">🧠</div> RealityOS AI</a>
    </div>
    <div class="navbar-actions">
      <a href="new-simulation.html" class="btn btn-ghost btn-sm">← New Simulation</a>
      <a href="dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
    </div>
  </nav>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Navigation</div>
      <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="new-simulation.html" class="sidebar-link"><span class="icon">➕</span> New Simulation</a>
      <a href="simulations.html" class="sidebar-link"><span class="icon">🗃️</span> My Simulations</a>
      <div class="sidebar-section-label">Account</div>
      <a href="profile.html" class="sidebar-link"><span class="icon">👤</span> Profile</a>
      <a href="#" class="sidebar-link" data-action="logout"><span class="icon">🚪</span> Sign Out</a>
    </nav>
  </aside>

  <div class="app-layout">
    <main class="main-content" id="results-container">
      <div style="text-align:center;padding:80px 20px;">
        <div class="spinner" style="margin:0 auto 20px;"></div>
        <p style="color:var(--text-muted);">Loading analysis results...</p>
      </div>
    </main>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Auth.redirectIfNotAuth();

      const container = document.getElementById('results-container');
      let analysis, params, simId = null;

      // Check if loading from saved simulation (results.html?id=X)
      const urlParams = new URLSearchParams(window.location.search);
      const loadId = urlParams.get('id');

      if (loadId) {
        const res = await API.getSimulation(loadId);
        if (res.ok && res.data.success) {
          const sim = res.data.simulation;
          analysis = sim.ai_analysis;
          simId = sim.id;
          params = {
            decision_title: sim.decision_title, category: sim.category,
            time_horizon: sim.time_horizon, risk_tolerance: sim.risk_tolerance
          };
        } else {
          container.innerHTML = `<div class="alert alert-error">Simulation not found or access denied.</div>`;
          return;
        }
      } else {
        // From sessionStorage (fresh analysis)
        const stored = sessionStorage.getItem('sim_result');
        if (!stored) { window.location.href = 'new-simulation.html'; return; }
        const parsed = JSON.parse(stored);
        analysis = parsed.analysis;
        params   = parsed.params;
      }

      if (!analysis) { container.innerHTML = `<div class="alert alert-error">No analysis data found.</div>`; return; }

      renderResults(analysis, params, simId);
    });

    function renderResults(a, params, simId) {
      const container = document.getElementById('results-container');
      const confScore = a.confidence_score || 0;
      const circumference = 2 * Math.PI * 50;
      const offset = circumference - (confScore / 100) * circumference;

      const riskColorMap = { 'Low': 'badge-green', 'Medium': 'badge-amber', 'High': 'badge-red' };
      const optAClass = a.recommended_option && a.recommended_option.toLowerCase().includes('a') ? 'recommended' : '';
      const optBClass = a.recommended_option && a.recommended_option.toLowerCase().includes('b') ? 'recommended' : '';
      const isSaved = !!simId;

      container.innerHTML = `
        <div class="page-header">
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <div>
              <h1>${params.decision_title || 'Decision Analysis'}</h1>
              <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
                <span class="badge badge-blue">${getCategoryIcon(params.category)} ${params.category || 'General'}</span>
                <span class="badge badge-purple">⏱ ${params.time_horizon || 'Mid-term'}</span>
                <span class="badge ${riskColorMap[params.risk_tolerance] || 'badge-amber'}">${params.risk_tolerance || 'Medium'} Risk Tolerance</span>
              </div>
            </div>
            
            <!-- Action Buttons (Hidden on Print) -->
            <div class="action-btns" style="margin-left:auto;display:flex;gap:10px;">
              <button onclick="window.print()" class="btn btn-ghost btn-sm print-exclude" title="Download as PDF">
                🖨️ Export PDF
              </button>
              <button onclick="copyShareLink()" class="btn btn-ghost btn-sm" title="Copy report link">
                🔗 Copy Link
              </button>
              <button onclick="copyResultSummary()" class="btn btn-primary btn-sm print-include" title="Copy text summary">
                📝 Copy Summary
              </button>
            </div>
          </div>
        </div>

        <!-- RECOMMENDATION HERO -->
        <div class="recommendation-hero result-section animate-slide-in">
          <div style="display:flex;align-items:center;gap:32px;flex-wrap:wrap;">
            <div class="confidence-ring">
              <svg width="120" height="120" viewBox="0 0 120 120">
                <defs>
                  <linearGradient id="confidenceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#4f8ef7" />
                    <stop offset="100%" stop-color="#8b5cf6" />
                  </linearGradient>
                </defs>
                <circle class="track" cx="60" cy="60" r="50" />
                <circle class="fill gradient-fill" cx="60" cy="60" r="50"
                  stroke-dasharray="${circumference}"
                  stroke-dashoffset="${circumference}"
                  id="conf-ring" />
              </svg>
              <div class="confidence-value">
                <span class="number" id="conf-number">0%</span>
                <span class="label" id="conf-label" style="font-size:0.65rem;font-weight:700;letter-spacing:0.02em;text-transform:uppercase;">...</span>
              </div>
            </div>
            <div style="flex:1;min-width:220px;">
              <div style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">✅ AI Recommendation</div>
              <h2 style="font-size:1.8rem;margin-bottom:12px;background:var(--gradient-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${a.recommended_option || 'No recommendation'}</h2>
              
              <div class="rec-details-grid">
                <!-- WHY IT WINS -->
                <div>
                  <div style="font-size:0.8rem;font-weight:700;color:var(--accent-blue);margin-bottom:4px;">🎯 Why it wins</div>
                  <p style="color:var(--text-secondary);font-size:0.85rem;line-height:1.5;">
                    ${a.recommendation_details?.why_better || a.reasoning || 'No specific reasoning provided.'}
                  </p>
                </div>

                <!-- SITUATIONAL PERKS (Hidden if old data) -->
                ${a.recommendation_details?.situational_advantages ? `
                <div>
                  <div style="font-size:0.8rem;font-weight:700;color:var(--accent-purple);margin-bottom:4px;">✨ Situational perks</div>
                  <ul style="color:var(--text-secondary);font-size:0.85rem;line-height:1.5;padding-left:18px;margin:0;">
                    ${a.recommendation_details.situational_advantages.map(adv => `<li>${adv}</li>`).join('')}
                  </ul>
                </div>` : ''}

                <!-- CAUTION (Hidden if old data) -->
                ${a.recommendation_details?.when_not_to_choose ? `
                <div>
                  <div style="font-size:0.8rem;font-weight:700;color:#f87171;margin-bottom:4px;">⚠️ When NOT to choose</div>
                  <p style="color:var(--text-secondary);font-size:0.85rem;line-height:1.5;">
                    ${a.recommendation_details.when_not_to_choose}
                  </p>
                </div>` : ''}
              </div>
            </div>
          </div>
            <div style="margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06);">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <div style="font-size:0.75rem;color:var(--text-muted);">AI Confidence Level</div>
                <div id="conf-status-pill" style="font-size:0.65rem;padding:2px 8px;border-radius:99px;font-weight:700;">...</div>
              </div>
              <div class="meter-track meter-blue" style="height:10px;">
                <div class="meter-fill" id="conf-bar" style="width:0%;"></div>
              </div>
              <p style="font-size:0.68rem;color:var(--text-muted);margin-top:8px;line-height:1.4;">
                ℹ️ This score reflects the AI's certainty based on data patterns, risk alignment, and historical decision outcomes.
              </p>
            </div>
          </div>
        </div><!-- DECISION SUMMARY -->
        ${a.decision_summary ? `
        <div class="result-section">
          <div class="section-title">📝 Decision Summary</div>
          <div class="card">
            <p style="color:var(--text-secondary);font-size:0.95rem;line-height:1.8;">${a.decision_summary}</p>
          </div>
        </div>` : ''}

        <!-- SIDE-BY-SIDE COMPARISON -->
        <div class="result-section">
          <div class="section-title">⚖️ Option Comparison</div>
          <div class="comparison-grid">
            ${renderOptionCard(a.option_a, 'A', '#4f8ef7', optAClass)}
            <div class="comparison-divider">
              <div class="line"></div>
              <div class="vs-pill">VS</div>
              <div class="line"></div>
            </div>
            ${renderOptionCard(a.option_b, 'B', '#8b5cf6', optBClass)}
          </div>
        </div>

        <!-- VISUAL COMPARISON PANEL -->
        ${a.comparison ? `
        <div class="result-section">
          <div class="section-title">📊 Head-to-Head Comparison</div>
          <div class="card" style="padding:28px;" id="comparison-panel">
            ${renderComparisonPanel(a.comparison, a.option_a, a.option_b)}
          </div>
        </div>` : ''}

        <!-- AI REASONING -->
        ${a.reasoning ? `
      <div class="result-section">
          <div class="section-title">🤖 AI Reasoning</div>
          <div class="reasoning-block">"${a.reasoning}"</div>
        </div>` : ''}

        <!-- EXECUTION ROADMAP -->
        <div class="result-section">
          <div class="section-title">🚀 Execution Roadmap</div>
          <div class="card" style="padding:28px;">
            ${(function() {
              const roadmap = a.execution_roadmap || { action_steps: a.action_steps || [] };
              const steps = roadmap.action_steps || [];
              const prep = roadmap.preparation_list || [];
              const mistakes = roadmap.common_mistakes || [];
              const timeline = roadmap.timeline_expectations || "";

              return `
                <!-- Timeline/Header -->
                ${timeline ? `
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding:12px 16px;background:rgba(79,142,247,0.1);border-radius:12px;border:1px solid rgba(79,142,247,0.2);">
                  <span style="font-size:1.2rem;">⏳</span>
                  <div>
                    <div style="font-size:0.7rem;font-weight:700;color:var(--accent-blue);text-transform:uppercase;letter-spacing:0.05em;">Projected Timeline</div>
                    <div style="font-size:0.9rem;color:var(--text-primary);font-weight:600;">${timeline}</div>
                  </div>
                </div>` : ''}

                <!-- Main Steps -->
                <div style="margin-bottom:32px;">
                  <div style="font-size:0.85rem;font-weight:700;color:var(--text-secondary);margin-bottom:16px;display:flex;align-items:center;gap:8px;">
                    <span style="background:var(--gradient-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">01. Execution Steps</span>
                  </div>
                  <div class="action-steps">
                    ${steps.map((s, i) => `
                    <div class="action-step">
                      <div class="step-num">${i + 1}</div>
                      <div class="step-text">${s}</div>
                    </div>`).join('')}
                  </div>
                </div>

                <!-- Prep & Mistakes Grid -->
                <div class="roadmap-grid">
                  <!-- Preparation -->
                  ${prep.length ? `
                  <div style="background:rgba(255,255,255,0.02);padding:20px;border-radius:16px;border:1px solid rgba(255,255,255,0.05);">
                    <div style="font-size:0.8rem;font-weight:700;color:var(--accent-blue);margin-bottom:12px;display:flex;align-items:center;gap:8px;">
                      <span>🛠️ What to Prepare</span>
                    </div>
                    <ul style="margin:0;padding:0;list-style:none;">
                      ${prep.map(p => `<li style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;">
                        <span style="color:#10b981;">✓</span>
                        <span>${p}</span>
                      </li>`).join('')}
                    </ul>
                  </div>` : ''}

                  <!-- Common Mistakes -->
                  ${mistakes.length ? `
                  <div style="background:rgba(255,255,255,0.02);padding:20px;border-radius:16px;border:1px solid rgba(255,255,255,0.05);">
                    <div style="font-size:0.8rem;font-weight:700;color:#f87171;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
                      <span>🚫 Common Mistakes</span>
                    </div>
                    <ul style="margin:0;padding:0;list-style:none;">
                      ${mistakes.map(m => `<li style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;">
                        <span style="color:#f87171;">✕</span>
                        <span>${m}</span>
                      </li>`).join('')}
                    </ul>
                  </div>` : ''}
                </div>
              `;
            })()}
          </div>
        </div>

        <!-- FINAL VERDICT -->
        ${a.final_verdict ? `
        <div class="result-section">
          <div class="section-title">🏆 Final Verdict</div>
          <div class="verdict-banner">
            <p style="color:var(--text-secondary);font-size:0.95rem;line-height:1.8;">${a.final_verdict}</p>
          </div>
        </div>` : ''}

        <!-- SAVE / ACTIONS -->
        <div id="save-btn-area">
          ${isSaved ? `
          <span style="padding:12px 20px;font-size:0.85rem;color:var(--accent-green);">✓ This simulation is saved</span>
          <a href="simulations.html" class="btn btn-ghost">View All Simulations</a>
          <a href="new-simulation.html" class="btn btn-primary">+ New Simulation</a>
          ` : `
          <a href="new-simulation.html" class="btn btn-ghost">← New Simulation</a>
          <button class="btn btn-primary" id="save-btn">💾 Save This Report</button>
          `}
        </div>
        <div id="save-success" class="alert alert-success" style="margin-top:12px;display:none;">✓ Simulation saved successfully! <a href="simulations.html" style="color:var(--accent-blue);margin-left:8px;">View in My Simulations →</a></div>
      `;

// Animate confidence ring
      setTimeout(() => {
        const ring = document.getElementById('conf-ring');
        const numEl = document.getElementById('conf-number');
        const labelEl = document.getElementById('conf-label');
        const barEl = document.getElementById('conf-bar');
        const pillEl = document.getElementById('conf-status-pill');
        
        if (ring) ring.style.strokeDashoffset = (circumference - (confScore / 100) * circumference);
        
        if (numEl) {
          let n = 0;
          const t = setInterval(() => {
            if (n >= confScore) { clearInterval(t); }
            else { n++; numEl.textContent = n + '%'; }
          }, 1200 / Math.max(confScore, 1));
        }

        // Set qualitative label and color
        if (labelEl && pillEl) {
          let label = "Low";
          let color = "#ef4444"; // Red
          if (confScore >= 90) { label = "Very High"; color = "#10b981"; }
          else if (confScore >= 75) { label = "High"; color = "#10b981"; }
          else if (confScore >= 50) { label = "Moderate"; color = "#f59e0b"; }
          
          labelEl.textContent = label;
          labelEl.style.color = color;
          pillEl.textContent = label + " Certainty";
          pillEl.style.background = color + "22"; // 15% opacity
          pillEl.style.color = color;
        }

        if (barEl) setTimeout(() => barEl.style.width = confScore + '%', 100);

        // Animate opportunity score bars — must run AFTER innerHTML is set
        document.querySelectorAll('.opp-bar').forEach(b => {
          b.style.transition = 'width 1.2s cubic-bezier(0.4,0,0.2,1)';
          b.style.width = b.dataset.score + '%';
        });

        // Animate comparison bars
        document.querySelectorAll('.cmp-row').forEach(row => {
          const barA = row.querySelector('.cmp-bar-a');
          const barB = row.querySelector('.cmp-bar-b');
          if (barA) barA.style.width = row.dataset.sa + '%';
          if (barB) barB.style.width = row.dataset.sb + '%';
        });

        // Animate risk meters
        const riskMap = { 'Low': '20%', 'Medium': '50%', 'High': '90%' };
        document.querySelectorAll('.risk-bar').forEach(b => {
          b.style.transition = 'width 1.2s cubic-bezier(0.4,0,0.2,1)';
          b.style.width = riskMap[b.dataset.risk] || '0%';
        });
      }, 300);

      // Save button
      const saveBtn = document.getElementById('save-btn');
      if (saveBtn) {
        const stored = JSON.parse(sessionStorage.getItem('sim_result') || '{}');
        saveBtn.addEventListener('click', async () => {
          saveBtn.disabled = true;
          saveBtn.innerHTML = '<div class="spinner spinner-sm" style="margin-right:8px;border-top-color:#fff;"></div>Saving...';

          const payload = { ...stored.params, ai_response_json: stored.analysis };
          const res = await API.saveSimulation(payload);

          if (res.ok && res.data.success) {
            document.getElementById('save-success').style.display = 'flex';
            saveBtn.innerHTML = '✓ Saved!';
            sessionStorage.removeItem('sim_result');
          } else {
            saveBtn.disabled = false;
            saveBtn.innerHTML = '💾 Save This Report';
            alert(res.data.error || 'Save failed. Please try again.');
          }
        });
      }
    }

    function renderOptionCard(opt, label, color, extraClass) {
      if (!opt) return `<div class="option-card"><p style="color:var(--text-muted);">No data for Option ${label}</p></div>`;
      const riskMap = { 'Low': '#10b981', 'Medium': '#f59e0b', 'High': '#ef4444' };
      const riskColor = riskMap[opt.risk_level] || '#94a3b8';
      const scoreColor = opt.opportunity_score >= 75 ? '#10b981' : opt.opportunity_score >= 50 ? '#f59e0b' : '#ef4444';
      const isRec = extraClass === 'recommended';

      return `
        <div class="option-card ${extraClass}" style="position:relative;">
          ${isRec ? `<div style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#4f8ef7,#8b5cf6);color:white;font-size:0.7rem;font-weight:700;padding:5px 14px;border-radius:999px;white-space:nowrap;z-index:2;">⭐ AI RECOMMENDED</div>` : ''}
          <div class="option-header">
            <div>
              <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:4px;">Option ${label}</div>
              <h3 style="font-size:1.1rem;color:${color};">${opt.title || `Option ${label}`}</h3>
            </div>
            <span class="badge ${opt.risk_level === 'Low' ? 'badge-green' : opt.risk_level === 'High' ? 'badge-red' : 'badge-amber'}">${opt.risk_level || 'N/A'} Risk</span>
          </div>

          ${opt.analysis ? `<p style="color:var(--text-secondary);font-size:0.85rem;line-height:1.7;margin-bottom:16px;">${opt.analysis}</p>` : ''}

          <!-- Opportunity Score -->
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:0.78rem;color:var(--text-muted);">Opportunity Score</span>
              <span style="font-size:0.85rem;font-weight:700;color:${scoreColor};">${opt.opportunity_score || 0}%</span>
            </div>
            <div class="meter-track" style="height:6px;">
              <div class="meter-fill opp-bar" data-score="${opt.opportunity_score || 0}" style="width:0%;background:${scoreColor};"></div>
            </div>
          </div>

          <!-- Risk Meter -->
          <div style="margin-bottom:20px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:0.78rem;color:var(--text-muted);">Risk Level</span>
              <span style="font-size:0.85rem;font-weight:700;color:${riskColor};">${opt.risk_level || 'N/A'}</span>
            </div>
            <div class="meter-track" style="height:6px;">
              <div class="meter-fill risk-bar" data-risk="${opt.risk_level}" style="width:0%;background:${riskColor};"></div>
            </div>
          </div>

          ${opt.pros && opt.pros.length ? `
          <div style="margin-bottom:14px;">
            <div style="font-size:0.75rem;font-weight:700;color:#10b981;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">✅ Pros</div>
            <ul class="pros-cons-list">
              ${opt.pros.map(p => `<li class="pro"><span style="flex:1;">${p}</span></li>`).join('')}
            </ul>
          </div>` : ''}

          ${opt.cons && opt.cons.length ? `
          <div style="margin-bottom:14px;">
            <div style="font-size:0.75rem;font-weight:700;color:#ef4444;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">⚠ Cons</div>
            <ul class="pros-cons-list">
              ${opt.cons.map(c => `<li class="con"><span style="flex:1;">${c}</span></li>`).join('')}
            </ul>
          </div>` : ''}

          ${opt.short_term_outlook ? `<div class="outlook-box outlook-short"><div style="font-size:0.7rem;font-weight:700;color:var(--accent-blue);margin-bottom:4px;">⚡ Short-Term Outlook</div>${opt.short_term_outlook}</div>` : ''}
          ${opt.long_term_outlook  ? `<div class="outlook-box outlook-long"><div style="font-size:0.7rem;font-weight:700;color:var(--accent-purple);margin-bottom:4px;">🔭 Long-Term Outlook</div>${opt.long_term_outlook}</div>` : ''}
        </div>`;
    }

    // (opportunity bar animation moved inside renderResults — see above)

    // ─── Visual comparison panel ──────────────────────────────────────────────
    function renderComparisonPanel(cmp, optA, optB) {
      const METRICS = [
        { key: 'risk_level',       icon: '🛡️', label: 'Risk Level',       colorA: '#4f8ef7', colorB: '#8b5cf6' },
        { key: 'growth_potential', icon: '📈', label: 'Growth Potential',  colorA: '#4f8ef7', colorB: '#8b5cf6' },
        { key: 'cost_efficiency',  icon: '💵', label: 'Cost Efficiency',   colorA: '#4f8ef7', colorB: '#8b5cf6' },
        { key: 'time_to_results',  icon: '⚡', label: 'Time to Results',   colorA: '#4f8ef7', colorB: '#8b5cf6' },
        { key: 'stability',        icon: '🏗️', label: 'Stability',         colorA: '#4f8ef7', colorB: '#8b5cf6' },
      ];

      const titleA = (optA && optA.title) ? optA.title : 'Option A';
      const titleB = (optB && optB.title) ? optB.title : 'Option B';

      // Header row
      let html = `
        <div class="comparison-panel-grid" style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.06);">
          <div class="metric-label"></div>
          <div style="text-align:right;font-size:0.78rem;font-weight:700;color:#4f8ef7;">${titleA}</div>
          <div></div>
          <div style="text-align:left;font-size:0.78rem;font-weight:700;color:#8b5cf6;">${titleB}</div>
        </div>`;

      METRICS.forEach((m, idx) => {
        const metric = cmp[m.key];

        // Support new scored format
        if (metric && typeof metric === 'object' && 'option_a_score' in metric) {
          const sA     = Math.min(100, Math.max(0, parseInt(metric.option_a_score) || 0));
          const sB     = Math.min(100, Math.max(0, parseInt(metric.option_b_score) || 0));
          const winner = (metric.winner || '').toLowerCase();
          const aWins  = winner.includes('a') && !winner.includes('b');
          const bWins  = winner.includes('b');
          const note   = metric.note || '';

          html += `
          <div class="cmp-row" data-sa="${sA}" data-sb="${sB}" style="display:grid;grid-template-columns:160px 1fr 60px 1fr;gap:12px;align-items:center;margin-bottom:14px;animation:fadeSlideIn 0.4s ease ${0.08 * idx}s both;">
            <div>
              <div style="font-size:0.82rem;font-weight:700;color:var(--text-secondary);">${m.icon} ${m.label}</div>
              ${note ? `<div style="font-size:0.68rem;color:var(--text-muted);margin-top:2px;">${note}</div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
              <div style="display:flex;align-items:center;gap:8px;width:100%;justify-content:flex-end;">
                ${aWins ? `<span style="font-size:0.65rem;background:linear-gradient(135deg,#4f8ef7,#38bdf8);color:white;padding:2px 8px;border-radius:999px;font-weight:700;">👑 Winner</span>` : ''}
                <span style="font-size:0.82rem;font-weight:700;color:#4f8ef7;">${sA}</span>
              </div>
              <div style="width:100%;height:8px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;">
                <div class="cmp-bar-a" style="height:100%;width:0%;background:linear-gradient(90deg,#4f8ef7,#38bdf8);border-radius:999px;transition:width 1.1s cubic-bezier(0.4,0,0.2,1) ${0.05 * idx}s;"></div>
              </div>
            </div>
            <div style="text-align:center;font-size:0.7rem;font-weight:700;color:var(--text-muted);padding:0 4px;">VS</div>
            <div style="display:flex;flex-direction:column;align-items:flex-start;gap:4px;">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:0.82rem;font-weight:700;color:#8b5cf6;">${sB}</span>
                ${bWins ? `<span style="font-size:0.65rem;background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:white;padding:2px 8px;border-radius:999px;font-weight:700;">👑 Winner</span>` : ''}
              </div>
              <div style="width:100%;height:8px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;">
                <div class="cmp-bar-b" style="height:100%;width:0%;background:linear-gradient(90deg,#8b5cf6,#a78bfa);border-radius:999px;transition:width 1.1s cubic-bezier(0.4,0,0.2,1) ${0.05 * idx}s;"></div>
              </div>
            </div>
          </div>`;

        } else {
          // Fallback: old text-winner format
          const legacyMap = {
            risk_level: cmp.better_for_safety, growth_potential: cmp.better_for_growth,
            cost_efficiency: cmp.better_for_cost_efficiency,
            time_to_results: cmp.better_for_speed, stability: null
          };
          const winner = legacyMap[m.key] || '—';
          html += `
          <div class="comparison-panel-grid cmp-row" style="margin-bottom:14px;">
          <div class="metric-label" style="font-size:0.75rem;color:var(--text-secondary);font-weight:600;">${m.icon} ${m.label}</div>
            <div style="grid-column:2/5;text-align:center;">
              <span class="win-badge">${winner}</span>
            </div>
          </div>`;
        }
      });

      return html;
    }

    // ---- Sharing & Export Logic (Global for onclick) ----
    window.showToast = function(msg, icon = '✨') {
      const toast = document.getElementById('toast-msg');
      if (!toast) return;
      toast.innerHTML = `<span>${icon}</span> ${msg}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    };

    window.copyShareLink = function() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        showToast('Link copied to clipboard!', '🔗');
      });
    };

    window.copyResultSummary = function() {
      const title = document.querySelector('.page-header h1').innerText;
      const rec = document.querySelector('.recommendation-hero h2').innerText;
      const conf = document.getElementById('conf-number').innerText;
      
      const summary = `🧠 RealityOS AI - Decision Intelligence Report\n\n` +
                      `Decision: ${title}\n` +
                      `AI Recommendation: ${rec}\n` +
                      `Confidence Score: ${conf}\n\n` +
                      `View full interactive report here:\n${window.location.href}`;
      
      navigator.clipboard.writeText(summary).then(() => {
        showToast('AI Summary copied to clipboard!', '📝');
      });
    };
  </script>
</body>
</html>
